name: Validate JSON

on:
  pull_request:
    paths:
      - "**/*.json"
      - "!schemas/**"

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm ci

      - name: Validate changed JSON files
        env:
          GITHUB_BASE_REF: ${{ github.event.pull_request.base.ref }}
        run: npm run validate:changed
